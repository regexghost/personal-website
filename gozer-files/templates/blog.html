<!DOCTYPE html>
<head>
  <title>{{ .Page.Title }}</title>
  <link rel="stylesheet" href="/style.css">
</head>
{{template "top.html"}}
    <h1>{{ .Title }}</h1>
{{ .Content }}
    <h2>Posts</h2>
    <ul>
    {{ range .Posts }}
    {{ if HasPrefix .Filepath "content/blog/" }}
      <li>{{ .DatePublished.Format "2006-01-02" }} - <a href="{{ .Permalink }}">{{ .Title }}</a></li>
	{{ end }}
    {{ end }}
    </ul>
{{template "bottom.html"}}
